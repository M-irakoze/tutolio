services:
  # Type of service
  type: web
  
  # Name of your service
  name: programming-tutorials
  
  # Runtime environment
  runtime: docker
  
  # Plan (free or paid)
  plan: free
  
  # Build configuration
  buildCommand: ""
  startCommand: ""
  
  # Health check path
  healthCheckPath: /
  
  # Environment variables (these will be set in Render dashboard)
  envVars:
    - key: DB_HOST
      value: gateway01.eu-central-1.prod.aws.tidbcloud.com
    - key: DB_PORT
      value: "4000"
    - key: DB_NAME
      value: tutorials_platform
    - key: DB_USER
      value: 4FpxFa9rDe6N6p4.root
    - key: DB_PASS
      value: nVqQt9d1DCLuD0z1
    - key: APP_ENV
      value: production
    - key: APP_DEBUG
      value: "false"
    - key: BASE_URL
      sync: false

  # Auto-deploy configuration
  autoDeploy: true
  
  # Branch to deploy
  branch: main
  
  # Root directory
  rootDir: .
